name: Test Backend

on:
  pull_request:
    branches: [main]
    paths:
      - "tocopedia-backend/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: tocopedia-backend
        run: npm ci

      - name: Run tests
        working-directory: tocopedia-backend
        run: npm test
