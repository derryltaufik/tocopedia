name: Test Flutter

on:
  pull_request:
    branches: [main]
    paths:
      - "tocopedia-flutter/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"

      - name: Install dependencies
        working-directory: tocopedia-flutter
        run: flutter pub get

      - name: Analyze
        working-directory: tocopedia-flutter
        run: flutter analyze

      - name: Run tests
        working-directory: tocopedia-flutter
        run: flutter test
