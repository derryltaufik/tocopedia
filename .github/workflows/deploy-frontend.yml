name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "tocopedia-flutter/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"

      - name: Build web
        working-directory: tocopedia-flutter
        run: flutter build web --release --dart-define=BASE_URL=${{ secrets.API_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy tocopedia-flutter/build/web --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
